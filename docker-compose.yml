version: '3.9'

services:

  user-db:
    image: postgres:16
    container_name: user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userdb
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    container_name: nats
    ports:
      - "4222:4222"

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - user-db
      - redis
      - nats
    ports:
      - "50051:50051"

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - user-service
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
  order-db:
    image: postgres:16
    container_name: order-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orderdb
    ports:
      - "5434:5432"
  order-service:
    build: ./order-service
    container_name: order-service
    depends_on:
      - order-db
      - nats
    ports:
      - "50052:50052"