services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0000
      POSTGRES_DB: orderdb
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    ports:
      - "4222:4222"

  order-service:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile

    ports:
      - "50051:50051"

    depends_on:
      - postgres
      - redis
      - nats