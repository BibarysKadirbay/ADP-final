syntax = "proto3";

package order;

option go_package = "order-service/internal/infrastructure/grpc/orderpb";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder(GetOrderRequest) returns (OrderResponse);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (OrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (OrderResponse);
  rpc GetOrdersByUser(GetOrdersByUserRequest) returns (OrdersResponse);
}

message CreateOrderRequest {
  string user_id = 1;
  string restaurant_id = 2;
  int64 total_price = 3;
  string address = 4;
  string comment = 5;
}

message GetOrderRequest {
  string order_id = 1;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  string status = 2;
}

message CancelOrderRequest {
  string order_id = 1;
}

message GetOrdersByUserRequest {
  string user_id = 1;
}

message OrderResponse {
  string order_id = 1;
  string user_id = 2;
  string restaurant_id = 3;
  string delivery_id = 4;

  int64 total_price = 5;

  string status = 6;
  string payment_status = 7;

  string address = 8;
  string comment = 9;
}

message OrdersResponse {
  repeated OrderResponse orders = 1;
}